# HTTP — certbot will add HTTPS and redirect. Replace __DOMAIN__ during setup.
upstream ai_sub_sell_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    client_max_body_size 10M;

    location / {
        proxy_pass http://ai_sub_sell_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Brief 502/503 while systemd restarts Next.js after deploy
        proxy_intercept_errors on;
        error_page 502 503 =503 /maintenance.html;
    }

    location = /maintenance.html {
        internal;
        root /opt/ai-sub-sell/app/deploy/nginx;
        add_header Retry-After 15 always;
    }
}
