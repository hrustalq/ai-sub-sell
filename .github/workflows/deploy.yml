name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate deploy secrets
        run: |
          missing=()
          [[ -z "${{ secrets.VPS_HOST }}" ]] && missing+=(VPS_HOST)
          [[ -z "${{ secrets.VPS_USER }}" ]] && missing+=(VPS_USER)
          [[ -z "${{ secrets.VPS_SSH_KEY }}" ]] && missing+=(VPS_SSH_KEY)
          if ((${#missing[@]})); then
            echo "::error::Missing GitHub secrets: ${missing[*]}"
            echo "Add them under Settings → Secrets → Actions, or under Environments → production (this workflow uses the production environment)."
            exit 1
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_ROOT="${{ secrets.VPS_APP_ROOT }}"
            if [[ -z "$APP_ROOT" ]]; then APP_ROOT="/opt/ai-sub-sell"; fi
            APP_DIR="$APP_ROOT/app"
            export APP_ROOT APP_DIR
            export SKIP_DEPS_CHECK=1
            # Pull before deploy.sh so CI does not run a stale copy (bash holds the inode across in-script git pull).
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            exec bash "$APP_DIR/deploy/deploy.sh"
